name: RepoAssure feature request
description: Propose a product, workflow, or engineering baseline change.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or engineering problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful change and expected artifacts.
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Product feature
        - Acceptance workflow
        - CI or repository governance
        - Documentation
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: List the checks, docs, and user acceptance evidence required.
    validations:
      required: true
